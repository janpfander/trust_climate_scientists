project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!cleaning*.qmd"
    - "!not_in_questionnaire.qmd"
  
freeze: auto 

website:
  title: "Home"
  site-url: https://janpfander.github.io/trust_climate_scientists/
  description: "The Trust-In Megastudy is a collaborative research project to strengthen trust in climate scientists in the United States."
  navbar:
    left:
      - href: preregistration/preregistration.qmd
        text: "Preregistration"
      - href: questionnaire.qmd
        text: "Survey"
      - href: timeline.qmd
        text: "Timeline"
      - href: call_for_collaborations.qmd
        text: "Collaborate"
      - href: team.qmd
        text: "Team"
      
    # Contact
    right:
      - text: "{{< iconify bi envelope size=1.1em title='E-mail' >}} Write us an email"
        href: "mailto:{{< var email >}}" 
      # - icon: rss
      #   href: newsletter.xml

  page-footer: 
    background: light
    left: |
      <span class="faux-block">{{< fa brands creative-commons >}} {{< var years >}} Jan Pfänder</span>
    right: |
      <span class="faux-block">Made with {{< fa brands r-project >}} and [Quarto](https://quarto.org/)</span>, 
      <span class="faux-block">[View the source at {{< fa brands github >}} GitHub]({{< var github-url >}})</span>

format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css
    toc: true
    toc-depth: 5
    code-fold: true
    link-external-newwindow: true

editor: source

title-block:
  banner: images/alternative_2.jpg
  banner-color: black
  
  
bibliography: references.bib
  

  



