<section id="$idprefix$title-slide"$for(title-slide-attributes/pairs)$ $it.key$="$it.value$"$endfor$>
  <h1 class="title">$title$</h1>
$if(subtitle)$
  <p class="subtitle">$subtitle$</p>
$endif$
$for(author)$
  <p class="author">$author$</p>
$endfor$
$for(institute)$
  <p class="institute">$institute$</p>
$endfor$
$if(date)$
  <p class="date">$date$</p>
$endif$
  <img class="title-logo title-logo-left" src="../images/eawag_logo.png" alt="Eawag">
  <img class="title-logo title-logo-right" src="../images/mpg_logo.png" alt="Max Planck Society">
</section>
